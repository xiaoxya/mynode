# —————————
# 基础设置
mixed-port: 7890
redir-port: 7891
tproxy-port: 1536
ipv6: false
mode: Rule
allow-lan: true
disable-keep-alive: true
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
experimental:
  http-headers:
    request:
      - name: "User-Agent"
        value: "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Mobile Safari/537.36"
      - name: "Accept-Language"
        value: "en-US,en;q=0.9"
unified-delay: true
tcp-concurrent: true
log-level: silent
find-process-mode: always
global-client-fingerprint: chrome
external-controller: 0.0.0.0:9999 # 切勿修改端口会影响状态栏磁贴
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-ui: "./Web/Zash/"
secret: "" # 面板访问密码，如在公网访问建议设置
# —————————
# ==== Tips

# 1. 修改配置文件保存时，建议重启服务/重载配置.
# —————————


# 健康检查
p: &p
  type: http
  interval: 86400
  health-check:
    enable: true
    url: http://www.apple.com/library/test/success.html
    interval: 300
  proxy: 订阅更新
  header: # 如遇订阅加载不出来请切换ua
      User-Agent:  # 使用注释法由上到下 默认使用第一个
        - "clash-verge/v2.2.3"
        - "ClashMetaForAndroid/2.11.2.Meta"
        - "ClashforWindows/0.19.23"
        - "clash.meta"
        - "mihomo"
# —————————

# 订阅地址相关
A: &A
  filter: "^(?!.*(套餐|重置|剩余|到期|订阅|群|账户|流量|有效期|时间|官网|失联|余额|教学服|资源服)).*$"
  use:
  - 1.自建订阅
  - 2.备用地址


proxy-providers: # ← 此函数位置请勿变动！此为模块更新时备份恢复订阅变量范围 ↓
  1.自建订阅: # 如遇订阅加载不出来，请尝试切换ua
    <<: *p
    override:
      additional-prefix: "My✅："
    path: ./proxies/1.自建订阅.yaml
    url: "https:///xsM2IAaB8A6etnlGI665/download/collection/My?target=ClashMeta"

  2.备用地址:
    <<: *p
    override:
      additional-prefix: "✈️："
    path: ./proxies/2.备用地址.yaml
    url: "https:///xsM2IAaB8A6etnlGI665/download/69%E4%BA%91?target=ClashMeta"



# —————————

# 节点记忆
profile: # ← 此函数位置请勿变动！此为模块更新时备份恢复订阅变量范围 ↑
  store-selected: true
  store-fake-ip: true
# —————————

# 嗅探模块
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 5228, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain: # 如遇需内部通信的应用请放行该域名
    - "Mijia Cloud"
# —————————

# 网卡模块
tun:
  enable: true
  device: Meta
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
  exclude-package: # 如黑白名单这里需排除
   # - com.tencent.mm
   # - com.tencent.mobileqq
    # _____________________# 三星专供 ↓ 范围
#    - com.samsung.android.messaging
#    - com.samsung.android.app.telephonyui
#    - com.samsung.android.dialer
#    - com.samsung.android.incallui
#    - com.samsung.android.smartcallprovider
#    - com.samsung.android.intellivoiceservice
#    - com.android.settings
#    - com.qti.qcc
#    - com.sec.epdg
#    - com.sec.imsservice # 三星专供 ↑ 范围
    # 非三星用户不必理会，三星用户需自行取消注释
# —————————


# DNS模块
# 请勿随意变动！
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  respect-rules: true  # 让 DNS 解析遵循 Clash 的路由规则
  cache-algorithm: arc # 使用性能更优的 ARC 缓存算法
  cache-size: 1024     # 限制缓存大小，避免占用过多内存
  # default-nameserver:
  #   - tls://223.5.5.5:853
  #   - 223.5.5.5
  #   - 8.8.8.8
  enhanced-mode: fake-ip # redir-host
  fake-ip-range: 172.20.0.1/16
  fake-ip-filter:
    - "RULE-SET:CN_域"
    - "RULE-SET:Private_域"
    - "RULE-SET:GoogleFCM_域"
    - "+.3gppnetwork.org"
    - "+.xtracloud.net"
  proxy-server-nameserver:
    - https://1.12.12.12:443/dns-query#🌐 本机·本地直连&h3=false
    - https://120.53.53.53:443/dns-query#🌐 本机·本地直连&h3=false
    - https://223.5.5.5:443/dns-query#🌐 本机·本地直连&h3=true
    - https://223.6.6.6:443/dns-query#🌐 本机·本地直连&h3=true
  nameserver-policy:
    "RULE-SET:CN_域,Microsoft_域,Apple_域":
      - https://1.12.12.12:443/dns-query#🌐 本机·本地直连&h3=false
      - https://120.53.53.53:443/dns-query#🌐 本机·本地直连&h3=false
      - https://223.5.5.5:443/dns-query#🌐 本机·本地直连&h3=true
      - https://223.6.6.6:443/dns-query#🌐 本机·本地直连&h3=true
  nameserver:
    # Google
    #- tls://223.5.5.5:853#DNS连接&h3=true
    - tls://dns.google:853#DNS连接&h3=true
    #- https://8.8.8.8:443/dns-query#DNS连接&h3=true
    # - https://8.8.4.4:443/dns-query#DNS连接&h3=true
    # # Cloudflare
    # - https://1.1.1.1:443/dns-query#DNS连接&h3=true
    # - https://1.0.0.1:443/dns-query#DNS连接&h3=true
  direct-nameserver:
    # 腾讯/阿里兜底
    # 正确配置本地后可移除 否则会卡[可选]
    # - 1.12.12.12
    # - 223.6.6.6
    # ----------------
    # 你的本地
    # 各大路由器/光猫默认 DNS
    #- 192.168.1.1    # 请确保当前局域网可通
    # SIM卡运营商 [下方替换成你的运营商 一般有鉴权]
    #- 120.80.80.80  # ← 替换成你想用的 或者删除
    #- 221.5.88.88   # ← 替换成你想用的 或者删除
# —————————

proxies:
  - {name: 🌐 本机·本地直连, type: direct, udp: true}
  - {name: ⛔️ 禁止·拒绝连接, type: reject}
  - {name: 🌐 DNS_Hijack, type: dns}

proxy_groups: &proxy_groups
    type: select
    proxies:
      - 总模式
      - ALL·所有地区
      - ALL·负载均衡
      - ALL·延迟最低
      - ALL.台湾
      - ALL.香港
      - ⛔️ 禁止·拒绝连接
      - 🌐 本机·本地直连
